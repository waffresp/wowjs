<!DOCTYPE html> <html lang="zh-CN"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>wfpj</title> <style> :root { --bg-color: #ffffff; --text-color: #1a1a1a; --accent-color: #000000; --gray-light: #f5f5f5; --shadow: 0 4px 20px rgba(0, 0, 0, 0.08); --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); } * { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; } main { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; } .content-wrapper { display: flex; align-items: center; justify-content: center; gap: 20px; position: relative; z-index: 1; } .menu-toggle { background: var(--accent-color); color: #fff; border: none; width: 50px; height: 50px; border-radius: 12px; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: var(--shadow); transition: var(--transition); flex-shrink: 0; } .menu-toggle:hover { transform: scale(1.1); background: #333; } .menu-icon { width: 24px; height: 2px; background: #fff; position: relative; transition: var(--transition); } .menu-icon::before, .menu-icon::after { content: ''; position: absolute; width: 24px; height: 2px; background: #fff; transition: var(--transition); } .menu-icon::before { top: -8px; } .menu-icon::after { top: 8px; } .menu-toggle.active .menu-icon { background: transparent; } .menu-toggle.active .menu-icon::before { transform: rotate(45deg); top: 0; } .menu-toggle.active .menu-icon::after { transform: rotate(-45deg); top: 0; } h1 { font-size: 48px; font-weight: 700; letter-spacing: -1px; margin-bottom: 0; cursor: default; transition: var(--transition); } h1:hover { transform: scale(1.02); opacity: 0.9; } .sidebar { position: fixed; top: 0; left: 0; width: 300px; height: 100%; background: #fff; box-shadow: 5px 0 30px rgba(0, 0, 0, 0.1); transform: translateX(-100%); transition: var(--transition); z-index: 100; display: flex; flex-direction: column; justify-content: center; padding: 40px; backdrop-filter: blur(10px); } .sidebar.open { transform: translateX(0); } .sidebar ul { list-style: none; } .sidebar li { margin: 20px 0; opacity: 0; transform: translateX(-20px); transition: var(--transition); } .sidebar.open li { opacity: 1; transform: translateX(0); } .sidebar.open li:nth-child(1) { transition-delay: 0.1s; } .sidebar.open li:nth-child(2) { transition-delay: 0.2s; } .sidebar a { text-decoration: none; color: var(--text-color); font-size: 24px; font-weight: 600; padding: 15px 20px; border-radius: 8px; display: block; transition: var(--transition); border: 1px solid transparent; cursor: pointer; } .sidebar a:hover { background: var(--gray-light); border-color: var(--accent-color); padding-left: 25px; } .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.3); opacity: 0; visibility: hidden; transition: var(--transition); z-index: 99; backdrop-filter: blur(2px); } .overlay.active { opacity: 1; visibility: visible; } footer { padding: 30px; text-align: center; font-size: 14px; color: #666; border-top: 1px solid #eee; } footer p { margin: 5px 0; } @media (max-width: 768px) { h1 { font-size: 36px; } .menu-toggle { position: fixed; left: 20px; top: 20px; z-index: 101; } .content-wrapper { justify-content: flex-start; padding-left: 90px; } .sidebar { width: 100%; } } </style> </head> <body> <main> <div class="content-wrapper"> <button class="menu-toggle" id="menuToggle" aria-label="菜单"> <span class="menu-icon"></span> </button> <h1>wfpj</h1> </div> </main> <div class="overlay" id="overlay"></div> <nav class="sidebar" id="sidebar"> <ul> <li><a href="/page/tools.html">工具提供</a></li> <li><a href="/page/sp.html">特殊存放</a></li> </ul> </nav> <footer> <p>网页版本0.0.1，由w3开发，正在等待更新</p> <p>cc.cd 爱发电</p> </footer> <script> const menuToggle = document.getElementById('menuToggle'); const sidebar = document.getElementById('sidebar'); const overlay = document.getElementById('overlay'); function toggleMenu() { const isOpen = sidebar.classList.contains('open'); if (isOpen) { sidebar.classList.remove('open'); overlay.classList.remove('active'); menuToggle.classList.remove('active'); } else { sidebar.classList.add('open'); overlay.classList.add('active'); menuToggle.classList.add('active'); } } menuToggle.addEventListener('click', toggleMenu); overlay.addEventListener('click', toggleMenu); const links = document.querySelectorAll('.sidebar a'); links.forEach(link => { link.addEventListener('click', () => { toggleMenu(); }); }); </script> </body> </html>
